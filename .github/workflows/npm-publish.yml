# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: NPM Package Publish

on:
  push:
    # Publish automatically when a release tag like v0.6.8 is created.
    tags:
      - "v*"
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Install, build, and typecheck
        run: |
          pnpm install
          pnpm build
          pnpm check-types
      - name: Start integration services
        run: docker compose up -d redis rabbitmq kafka nats
      - name: Wait for Kafka
        run: |
          for attempt in {1..60}; do
            if docker compose exec -T kafka sh -lc '
              KAFKA_TOPICS=$(command -v kafka-topics.sh || echo /opt/kafka/bin/kafka-topics.sh)
              KAFKA_GROUPS=$(command -v kafka-consumer-groups.sh || echo /opt/kafka/bin/kafka-consumer-groups.sh)
              "$KAFKA_TOPICS" --bootstrap-server localhost:9092 --list >/dev/null &&
                "$KAFKA_GROUPS" --bootstrap-server localhost:9092 --list >/dev/null
            '; then
              echo "Kafka is ready"
              exit 0
            fi
            echo "Waiting for Kafka ($attempt/60)"
            sleep 2
          done

          docker compose logs kafka
          exit 1
      - name: Test
        run: pnpm --filter kkrpc test
      - name: Stop integration services
        if: always()
        run: docker compose down
      - name: Check tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/kkrpc/package.json').version")
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [[ "$GITHUB_REF" != refs/tags/* ]]; then
            echo "Manual dispatch is not running on a tag; skipping tag/package version check"
            exit 0
          fi
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $TAG_NAME does not match package version $PACKAGE_VERSION (expected $EXPECTED_TAG)"
            exit 1
          fi
      - name: Check if version is already published
        id: check_version
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/kkrpc/package.json').version")
          PACKAGE_NAME=$(jq -r '.name' ./packages/kkrpc/package.json)
          # Use curl instead of npm view to avoid interfering with OIDC auth
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/${PACKAGE_NAME}/${PACKAGE_VERSION}")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION not found, will publish"
          fi
      - name: Set npm dist-tag
        id: dist_tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/kkrpc/package.json').version")
          DIST_TAG=$(node -e 'const version = process.argv[1]; const prerelease = version.match(/^[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z-]+)/); console.log(prerelease ? prerelease[1] : "latest")' "$PACKAGE_VERSION")
          echo "tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $PACKAGE_VERSION with npm dist-tag $DIST_TAG"
      - name: Publish
        if: steps.check_version.outputs.already_published == 'false'
        working-directory: ./packages/kkrpc
        run: npm publish --provenance --access public --tag "${{ steps.dist_tag.outputs.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
